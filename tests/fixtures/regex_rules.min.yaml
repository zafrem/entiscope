# Minimal language-neutral regex ruleset for CORE engine tests only.
# The shipped language data lives in the plugin packages (entiscope-ko, …);
# this fixture exercises the engine without depending on any installed plugin.
version: 1
language: test
rules:
  - label: SECRET
    pattern: 'sk-[A-Za-z0-9]{20,}'
    priority: 95
  - label: EMAIL
    pattern: '[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}'
    priority: 80
  - label: BANK
    pattern: '\d{4}-\d{4}-\d{4}-\d{4}'
    priority: 65
  - label: PHONE
    pattern: '\b\d{3}-\d{3}-\d{4}\b'
    priority: 50
